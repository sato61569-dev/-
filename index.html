<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>問題チェッカー v2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 問題チェッカー v2</h1>
            <p>AIの学習支援ツール</p>
        </header>

        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="quiz">クイズ</button>
            <button class="tab-btn" data-tab="settings">設定</button>
            <button class="tab-btn" data-tab="schedule">送信スケジュール</button>
            <button class="tab-btn" data-tab="stats">統計</button>
        </nav>

        <!-- クイズタブ -->
        <section id="quiz" class="tab-content active">
            <div class="quiz-container">
                <div class="quiz-header">
                    <div class="progress-info">
                        <h2 id="questionNumber">問題 1/30</h2>
                        <div class="progress-bar">
                            <div id="progressFill" class="progress-fill"></div>
                        </div>
                    </div>
                </div>

                <div class="quiz-card">
                    <div class="question-header">
                        <h3 id="questionText">問題を読み込み中...</h3>
                        <label class="word-register-toggle">
                            <input type="checkbox" id="registerWord" />
                            <span>単語登録</span>
                        </label>
                    </div>

                    <div id="optionsContainer" class="options-container">
                        <!-- 選択肢が動的に挿入される -->
                    </div>

                    <div class="quiz-actions">
                        <button id="prevBtn" class="btn btn-secondary">← 前へ</button>
                        <button id="nextBtn" class="btn btn-primary">次へ →</button>
                    </div>
                </div>

                <div class="quiz-stats">
                    <div class="stat-box correct">
                        <span class="stat-label">正解</span>
                        <span id="correctCount" class="stat-value">0</span>
                    </div>
                    <div class="stat-box incorrect">
                        <span class="stat-label">間違い</span>
                        <span id="incorrectCount" class="stat-value">0</span>
                    </div>
                    <div class="stat-box skipped">
                        <span class="stat-label">スキップ</span>
                        <span id="skippedCount" class="stat-value">0</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 設定タブ -->
        <section id="settings" class="tab-content">
            <div class="settings-container">
                <h2>⚙️ 設定</h2>

                <div class="setting-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="showProblemCount" checked />
                        問題数指定
                    </label>
                    <input type="number" id="problemCount" value="30" min="1" max="500" />
                </div>

                <div class="setting-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="enablePageManagement" checked />
                        ページ管理
                    </label>
                    <input type="number" id="problemsPerPage" value="50" min="10" max="200" />
                    <span class="setting-hint">各ページの問題数</span>
                </div>

                <div class="setting-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="enableJumpPages" />
                        飛ばすページ指定
                    </label>
                    <input type="text" id="jumpPages" placeholder="例: 41-50,56" />
                    <span class="setting-hint">除外するページ範囲</span>
                </div>

                <div class="setting-group">
                    <h3>ページ別設定 (例: 11-15,4,16,3,20,5)</h3>
                    <input type="text" id="customPageSettings" placeholder="例: 11-15,4,16,3,20,5" />
                </div>

                <div class="setting-actions">
                    <button class="btn btn-success" id="saveSetting">設定を保存</button>
                    <button class="btn btn-secondary" id="resetSetting">リセット</button>
                </div>
            </div>
        </section>

        <!-- 送信スケジュールタブ -->
        <section id="schedule" class="tab-content">
            <div class="schedule-container">
                <h2>📧 送信スケジュール設定</h2>

                <div class="schedule-settings">
                    <div class="schedule-group">
                        <h3>自動登録スイッチ</h3>
                        <div class="auto-schedule-options">
                            <label class="checkbox-label">
                                <input type="checkbox" class="auto-schedule" data-days="1" checked />
                                1日後
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" class="auto-schedule" data-days="7" checked />
                                7日後
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" class="auto-schedule" data-days="16" checked />
                                16日後
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" class="auto-schedule" data-days="35" checked />
                                35日後
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" class="auto-schedule" data-days="62" checked />
                                62日後
                            </label>
                        </div>
                    </div>

                    <div class="schedule-group">
                        <h3>送信予定日</h3>
                        <div class="schedule-list" id="scheduleList">
                            <!-- 動的に生成される -->
                        </div>
                    </div>

                    <div class="schedule-group">
                        <h3>重複検出と統合設定</h3>
                        <label class="checkbox-label">
                            <input type="checkbox" id="enableMergeEmails" checked />
                            同じ日時のメールを1つに統合
                        </label>
                        <div class="merge-info">
                            <p>1日被った場合は、複数の予定を1つのメールにまとめて送信します。</p>
                        </div>
                    </div>

                    <div class="schedule-actions">
                        <button class="btn btn-success" id="generateSchedule">スケジュール生成</button>
                        <button class="btn btn-info" id="previewSchedule">プレビュー</button>
                        <button class="btn btn-secondary" id="resetSchedule">リセット</button>
                    </div>
                </div>

                <div id="schedulePreview" class="schedule-preview" style="display: none;">
                    <h3>📋 スケジュール予定</h3>
                    <div id="previewContent" class="preview-content">
                        <!-- プレビューが挿入される -->
                    </div>
                </div>
            </div>
        </section>

        <!-- 統計タブ -->
        <section id="stats" class="tab-content">
            <div class="stats-container">
                <h2>📊 統計情報</h2>

                <div class="stats-overview">
                    <div class="stat-card">
                        <h3>間違い数</h3>
                        <p id="totalIncorrect" class="stat-number">4問</p>
                    </div>
                    <div class="stat-card">
                        <h3>問題数</h3>
                        <p id="totalProblems" class="stat-number">30問</p>
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="performanceChart"></canvas>
                </div>

                <div class="stats-actions">
                    <button class="btn btn-danger" id="clearStats">成績をリセット</button>
                </div>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
